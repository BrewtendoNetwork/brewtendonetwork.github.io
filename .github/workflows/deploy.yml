name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd new-site/frontend
          npm ci
      - name: Optimize images
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pngquant optipng jpegoptim
          cd new-site/frontend/public/images
          find . -iname '*.png' -exec pngquant --quality=65-80 --speed 1 --strip --force --ext .png {} \;
          find . -iname '*.png' -exec optipng -o2 -strip all -quiet {} \;
          find . \( -iname '*.jpg' -o -iname '*.jpeg' \) -exec jpegoptim --max=80 --strip-all {} \;
      - name: Build
        run: |
          cd new-site/frontend
          npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: new-site/frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
